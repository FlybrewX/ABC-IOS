<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DDA0DD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#grad1)" rx="200"/>
  
  <!-- Letter A -->
  <text x="512" y="700" font-size="500" font-weight="bold" text-anchor="middle" fill="#FF6B6B" font-family="Arial, sans-serif">A</text>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="60" fill="#FFE66D" opacity="0.8"/>
  <circle cx="900" cy="150" r="50" fill="#4ECDC4" opacity="0.8"/>
  <circle cx="850" cy="800" r="70" fill="#2ECC71" opacity="0.8"/>
</svg>